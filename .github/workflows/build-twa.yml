name: Build MK Movies TWA APK/AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build Android release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify project files
        run: |
          echo "Repository root: $PWD"
          test -f settings.gradle || { echo "::error::settings.gradle is missing. Upload the files to the repository root, not inside another folder."; exit 1; }
          test -f build.gradle || { echo "::error::build.gradle is missing. Upload the files to the repository root."; exit 1; }
          test -f app/build.gradle || { echo "::error::app/build.gradle is missing. The app folder was not uploaded correctly."; exit 1; }
          test -f app/src/main/AndroidManifest.xml || { echo "::error::AndroidManifest.xml is missing."; exit 1; }

      - name: Install Gradle 8.10.2
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare signing key
        env:
          MK_KEYSTORE_BASE64: ${{ secrets.MK_KEYSTORE_BASE64 }}
        run: |
          if [ ! -f mk-movies-release-key.jks ]; then
            if [ -n "$MK_KEYSTORE_BASE64" ]; then
              echo "$MK_KEYSTORE_BASE64" | base64 --decode > mk-movies-release-key.jks
            else
              echo "::error::mk-movies-release-key.jks was not found. Keep the repo private and upload the .jks file, or add MK_KEYSTORE_BASE64 as a repository secret."
              exit 1
            fi
          fi
          ls -lh mk-movies-release-key.jks

      - name: Build release APK and AAB
        env:
          MK_KEYSTORE_PASSWORD: ${{ secrets.MK_KEYSTORE_PASSWORD }}
          MK_KEY_PASSWORD: ${{ secrets.MK_KEY_PASSWORD }}
          MK_KEY_ALIAS: mk_movies
        run: |
          if [ -z "$MK_KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing repository secret: MK_KEYSTORE_PASSWORD"
            exit 1
          fi
          if [ -z "$MK_KEY_PASSWORD" ]; then
            echo "::error::Missing repository secret: MK_KEY_PASSWORD"
            exit 1
          fi
          gradle --version
          gradle --no-daemon --stacktrace :app:assembleRelease :app:bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mk-movies-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mk-movies-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
